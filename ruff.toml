# Ruff config — keep linting useful but not noisy for a beginner-friendly repo.
line-length = 100
target-version = "py310"

[lint]
# E/F = pyflakes+pycodestyle basics, I = import sorting, UP = pyupgrade.
select = ["E", "F", "I", "UP"]
ignore = [
    "E501",  # line length is enforced loosely; long strings/URLs are fine
    "E402",  # module-level imports after sys.path tweaks in bot.py are intentional
]

[lint.per-file-ignores]
"tests/*" = ["F811"]  # pytest fixtures shadow names by design
